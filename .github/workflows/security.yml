name: Security Baseline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "22 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-baseline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        continue-on-error: true
        run: npm audit --audit-level=high --omit=optional

      - name: Print security policy
        run: >
          node -e "console.log('Security policy: SECURITY.md. Supply-chain controls:
          docs/security.md.')"
