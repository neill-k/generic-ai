name: Bug report
description: Report a reproducible defect in Generic AI.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include commands, config, inputs, and the smallest repro you have.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include logs, stack traces, or screenshots if useful.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "v24.x"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Link related Linear issues, PRs, or design docs.
